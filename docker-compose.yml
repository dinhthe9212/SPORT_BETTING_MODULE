version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: sport_betting_postgres
    environment:
      POSTGRES_DB: sport_betting_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - sport_betting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sport_betting_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sport_betting_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka (for event streaming)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: sport_betting_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - sport_betting_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: sport_betting_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - sport_betting_network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Betting Service
  betting_service:
    build:
      context: ./betting_service
      dockerfile: Dockerfile
    container_name: sport_betting_betting_service
    ports:
      - "8002:8002"
    environment:
      - DB_NAME=betting_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=2
      - RISK_SERVICE_URL=http://risk_management_service:8003
      - WALLET_SERVICE_URL=http://wallet_service:8004
      - SAGA_SERVICE_URL=http://saga_orchestrator:8008
      - SPORTS_SERVICE_URL=http://sports_data_service:8005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sport_betting_network
    volumes:
      - ./shared:/app/shared
      - ./betting_service:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8002"

  # Carousel Service
  carousel_service:
    build:
      context: ./carousel_service
      dockerfile: Dockerfile.production
    container_name: sport_betting_carousel_service
    ports:
      - "8006:8006"
    environment:
      - DB_NAME=carousel_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=6
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sport_betting_network
    volumes:
      - ./shared:/app/shared
      - ./carousel_service:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8006"

  # Individual Bookmaker Service
  individual_bookmaker_service:
    build:
      context: ./individual_bookmaker_service
      dockerfile: Dockerfile
    container_name: sport_betting_individual_bookmaker_service
    ports:
      - "8007:8007"
    environment:
      - DB_NAME=individual_bookmaker_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=7
      - BETTING_SERVICE_URL=http://betting_service:8002
      - RISK_SERVICE_URL=http://risk_management_service:8003
      - WALLET_SERVICE_URL=http://wallet_service:8004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sport_betting_network
    volumes:
      - ./shared:/app/shared
      - ./individual_bookmaker_service:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8007"

  # Risk Management Service
  risk_management_service:
    build:
      context: ./risk_management_service
      dockerfile: Dockerfile
    container_name: sport_betting_risk_management_service
    ports:
      - "8003:8003"
    environment:
      - DB_NAME=risk_management_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sport_betting_network
    volumes:
      - ./shared:/app/shared
      - ./risk_management_service:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8003"

  # Saga Orchestrator
  saga_orchestrator:
    build:
      context: ./saga_orchestrator
      dockerfile: Dockerfile
    container_name: sport_betting_saga_orchestrator
    ports:
      - "8008:8008"
    environment:
      - DB_NAME=saga_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=8
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sport_betting_network
    volumes:
      - ./shared:/app/shared
      - ./saga_orchestrator:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8008"

  # Sports Data Service
  sports_data_service:
    build:
      context: ./sports_data_service
      dockerfile: Dockerfile
    container_name: sport_betting_sports_data_service
    ports:
      - "8005:8005"
    environment:
      - DB_NAME=sports_data_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=5
      - API_SPORTS_KEY=${API_SPORTS_KEY}
      - THE_ODDS_API_KEY=${THE_ODDS_API_KEY}
      - OPENLIGADB_KEY=${OPENLIGADB_KEY}
      - THESPORTSDB_KEY=${THESPORTSDB_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sport_betting_network
    volumes:
      - ./shared:/app/shared
      - ./sports_data_service:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8005"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: sport_betting_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - betting_service
      - carousel_service
      - individual_bookmaker_service
      - risk_management_service
      - saga_orchestrator
      - sports_data_service
    networks:
      - sport_betting_network

volumes:
  postgres_data:
  redis_data:

networks:
  sport_betting_network:
    driver: bridge
